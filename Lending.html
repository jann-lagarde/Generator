<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><?= companyName ?> | Capital Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '<?= primaryColor ?>', secondary: '<?= secondaryColor ?>' } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="<?= logoUrl ?>" class="h-12 w-auto object-contain">
                <span class="font-black text-xl tracking-tight text-slate-900"><?= companyName ?></span>
            </div>
            <span class="text-sm font-extrabold text-primary">Intake Hotline: <?= contactNumber ?></span>
        </div>
    </nav>

    <section class="bg-slate-900 text-white py-20 border-b border-slate-800">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-secondary"><?= heroTitle ?></h1>
            <p class="text-xl text-slate-400 font-light max-w-2xl mx-auto"><?= heroSubtitle ?></p>
        </div>
    </section>

    <!-- Unique Dynamic: Interactive Capital Engine Calculation Panel -->
    <section class="py-16 max-w-4xl mx-auto px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <h3 class="text-2xl font-black text-slate-900 mb-6 text-center">Amortization Capital Configurator</h3>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between font-bold text-sm text-slate-700 mb-2">
                        <span>Target Financing Amount</span>
                        <span class="text-primary" id="amountDisplay">$5,000</span>
                    </div>
                    <input type="range" id="loanAmount" min="1000" max="50000" step="500" value="5000" oninput="runAmortizationEngine()" class="w-full accent-primary">
                </div>
                <div>
                    <div class="flex justify-between font-bold text-sm text-slate-700 mb-2">
                        <span>Allotted Repayment Term</span>
                        <span class="text-primary" id="termDisplay">12 Months</span>
                    </div>
                    <input type="range" id="loanTerm" min="3" max="<?= maxTerm ?>" step="1" value="12" oninput="runAmortizationEngine()" class="w-full accent-primary">
                </div>

                <div class="p-6 bg-slate-900 text-white rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
                    <div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Estimated Monthly Installment</div>
                        <div class="text-3xl font-black text-secondary" id="monthlyPaymentDisplay">$0.00</div>
                    </div>
                    <div class="text-xs text-slate-400">
                        Calculated at baseline standard interest markup of <span class="font-bold text-white"><?= interestRate ?>%</span> per month.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-16 bg-slate-200">
        <div class="max-w-3xl mx-auto px-4">
            <div class="bg-white p-8 md:p-12 rounded-3xl shadow-lg">
                <h3 class="text-2xl font-black text-slate-900 text-center mb-8">Secure Underwriting Intakes</h3>
                <form class="space-y-4">
                    <div><label class="block text-xs font-bold text-slate-700 mb-1">Corporate/Personal Entity Name</label><input type="text" class="w-full border p-3 rounded-xl bg-slate-50 outline-none"></div>
                    <?!= funnelFields ?>
                    <button type="button" class="w-full py-4 bg-primary text-white font-bold rounded-xl mt-4 shadow-lg text-lg">Lock Financial Configuration</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        function runAmortizationEngine() {
            const principal = parseFloat(document.getElementById('loanAmount').value);
            const term = parseInt(document.getElementById('loanTerm').value);
            const monthlyRate = parseFloat("<?= interestRate ?>") / 100;

            document.getElementById('amountDisplay').innerText = '$' + principal.toLocaleString();
            document.getElementById('termDisplay').innerText = term + ' Months';

            // Fixed simple add-on calculation modeling common for sub-prime frameworks
            const simpleMonthlyPayment = (principal / term) + (principal * monthlyRate);
            document.getElementById('monthlyPaymentDisplay').innerText = '$' + simpleMonthlyPayment.toFixed(2);
        }
        window.onload = runAmortizationEngine;
    </script>
</body>
</html>
