<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>%%SITE_TITLE%% — Restaurant</title>
  <style>
    body{font-family:Georgia,serif;background:#fff;margin:0;color:#111}
    .hero{max-width:1000px;margin:40px auto;padding:36px;border-radius:14px;background:linear-gradient(180deg,#fff8f5,#fff)}
    h1{margin:0}
    .menu{max-width:1000px;margin:16px auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .dish{padding:12px;border-radius:8px;background:#fff;border:1px solid #f2e9e6}
    .reserve{max-width:1000px;margin:20px auto;padding:12px;border-radius:12px;background:#fff7f4}
    .btn{display:inline-block;padding:10px 14px;border-radius:10px;background:#ff6b6b;color:#fff;text-decoration:none}
  </style>
</head>
<body>
  <div class="hero">
    <h1>%%SITE_TITLE%%</h1>
    <p>%%TAGLINE%%</p>
  </div>

  <section>
    <h3 style="max-width:1000px;margin:12px auto">Menu</h3>
    <div class="menu">%%MENU%%</div>
  </section>

  <section class="reserve">
    <h3>Reservations</h3>
    <form onsubmit="event.preventDefault(); alert('Reservation sent — demo')">
      <input placeholder="Name" required style="padding:8px;border-radius:8px;border:1px solid #eee;margin-right:8px" />
      <input placeholder="Date" required style="padding:8px;border-radius:8px;border:1px solid #eee;margin-right:8px" />
      <button class="btn" type="submit">Request</button>
    </form>
  </section>

  <script>
    // no-op; keeping template minimal and performant
  </script>
</body>
</html>
