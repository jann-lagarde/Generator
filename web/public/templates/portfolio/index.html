<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>%%SITE_TITLE%% — Portfolio</title>
  <style>
    body{font-family:Inter,system-ui,Arial;background:#fff;margin:0;color:#0f172a}
    .hero{max-width:1100px;margin:48px auto;padding:28px;border-radius:12px}
    h1{margin:0}
    .projects{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:1100px;margin:18px auto}
    .proj{border-radius:10px;overflow:hidden;position:relative}
    .proj img{width:100%;height:160px;object-fit:cover;display:block}
    .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,13,20,0.0),rgba(12,13,20,0.3));opacity:0;transition:opacity .28s}
    .proj:hover .overlay{opacity:1}
  </style>
</head>
<body>
  <div class="hero">
    <h1>%%SITE_TITLE%%</h1>
    <p>%%TAGLINE%%</p>
  </div>

  <div class="projects">%%PROJECTS%%</div>

  <script>
    // minimal: enhance light hover interactions
  </script>
</body>
</html>
