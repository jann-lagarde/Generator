<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>%%SITE_TITLE%% — SaaS</title>
  <style>
    :root{--accent:#6c5ce7}
    body{font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#f7f7ff, #fff);margin:0;color:#0f172a}
    .hero{max-width:1100px;margin:48px auto;padding:48px;background:linear-gradient(180deg,#fff,#faf7ff);border-radius:18px;box-shadow:0 20px 40px rgba(16,24,40,0.08);display:flex;gap:24px;align-items:center}
    .hero .left{flex:1}
    .hero h1{margin:0;font-size:36px}
    .hero p{color:#475569}
    .cta{margin-top:18px}
    .btn{display:inline-block;padding:12px 18px;border-radius:12px;background:var(--accent);color:#fff;text-decoration:none}

    .features{display:flex;gap:12px;margin-top:20px}
    .card{flex:1;padding:16px;border-radius:12px;background:#fff;border:1px solid rgba(12,13,20,0.04);box-shadow:0 6px 18px rgba(16,24,40,0.04);transform:translateY(10px);opacity:0}
    .card:hover{transform:translateY(-6px)}

    .pricing{margin-top:28px;background:#fff;border-radius:12px;padding:16px;display:flex;gap:12px}
    .pricing .plan{flex:1;padding:12px;border-radius:10px;border:1px solid #eef2ff}

    /* subtle float animation */
    @keyframes float { 0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)} }
    .float{animation:float 6s ease-in-out infinite}
  </style>
</head>
<body>
  <div class="hero float">
    <div class="left">
      <h1>%%SITE_TITLE%%</h1>
      <p>%%TAGLINE%%</p>
      <div class="cta"><a class="btn" href="#">Get started</a></div>
    </div>
    <div class="right">
      <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='200'><rect width='100%' height='100%' rx='12' fill='%23f7f7ff'/><text x='20' y='60' font-size='22' fill='%236c5ce7'>App preview</text></svg>" alt="preview" style="border-radius:12px;box-shadow:0 10px 30px rgba(16,24,40,0.06)"/>
    </div>
  </div>

  <div class="features" style="max-width:1100px;margin:16px auto">
    <!-- FEATURES placeholder -->
    %%FEATURES%%
  </div>

  <div class="pricing" style="max-width:1100px;margin:16px auto">
    %%PRICING%%
  </div>

  <script>
    // small enhancement: animate feature cards on load
    document.addEventListener('DOMContentLoaded',()=>{
      const cards = document.querySelectorAll('.features .card')
      cards.forEach((c,i)=> setTimeout(()=>{ c.style.transform='translateY(0)'; c.style.opacity='1' }, i*120))
    })
  </script>
</body>
</html>
